---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: homelab-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
    - name: homelab.nodes
      rules:
        - alert: NodeDown
          expr: up{job="node-exporter"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ {{ \.instance }} }} esta down"
            description: "O node {{ {{ \.instance }} }} nao esta respondendo ha mais de 1 minuto."

        - alert: NodeCPUAlto
          expr: 100 - (avg by(instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "CPU alta no node {{ {{ \.instance }} }}"
            description: "CPU acima de 80% por mais de 5 minutos no node {{ {{ \.instance }} }}."

        - alert: NodeDiscoAlto
          expr: 100 - ((node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100) > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Disco alto no node {{ {{ \.instance }} }}"
            description: "Uso de disco acima de 85% no node {{ {{ \.instance }} }}."

        - alert: NodeMemoriaAlta
          expr: 100 - ((node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100) > 85
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Memoria alta no node {{ {{ \.instance }} }}"
            description: "Uso de memoria acima de 85% por mais de 5 minutos no node {{ {{ \.instance }} }}."
